name: Chimera CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run Spec Check
        run: make spec-check

      - name: Run Lint Via Make
        run: make lint

      - name: Run Tests Via Make
        run: make test
